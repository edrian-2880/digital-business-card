<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:320px;
            background:#fff;
            padding:20px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        /* SMALL PROFILE PICTURE */
        .profile{
            width:90px;
            height:90px;
            border-radius:50%;
            object-fit:cover;
            display:block;
            margin:0 auto 15px;
            border:3px solid #2563eb;
        }

        h1{
            margin-bottom:5px;
        }

        h3{
            color:#2563eb;
            margin-bottom:10px;
        }

        .location{
            color:#666;
            margin-bottom:15px;
        }

        .bio{
            line-height:1.5;
            color:#444;
            margin-bottom:20px;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:10px;
            margin-bottom:20px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:5px;
            background:#2563eb;
            color:white;
            cursor:pointer;
        }

        .skills{
            text-align:left;
            margin-top:20px;
        }

        .skills h2{
            margin-bottom:10px;
        }

        .skills ul{
            padding-left:20px;
        }

        .skills li{
            margin-bottom:5px;
        }

        footer{
            margin-top:20px;
            color:#666;
        }
    </style>

</head>
<body>

<div class="card">

    <img src="1000220032.jpg" alt="Adrian Ngugi" class="profile">

    <h1>Adrian Ngugi</h1>

    <h3>Frontend Developer</h3>

    <p class="location">📍 Nakuru, Kenya</p>

    <p class="bio">
        Passionate about web development, technology,
        and solving real-world problems through code.
    </p>

    <div class="buttons">
        <button>Email</button>
        <button>LinkedIn</button>
    </div>

    <div class="skills">
        <h2>Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>Responsive Design</li>
        </ul>
    </div>

    <footer>
        © 2026 Adrian Ngugi
    </footer>

</div>

</body>
</html>
